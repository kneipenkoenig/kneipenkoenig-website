    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }

    @keyframes navLineRun { from { left: -30%; } to { left: 130%; } }

    .page-wrap { min-height: 100vh; padding: 120px 5% 60px; }

    .section-label::before { content: ''; display: block; width: 28px; height: 1px; background: #38b6ff; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.4rem, 5vw, 4rem); letter-spacing: 0.03em; }
    .page-sub { color: var(--text-secondary); margin-top: 6px; font-size: 1rem; }

    .results-grid {

    }
    .results-iframe-wrap {
      background: rgba(255,255,255,0.04);

    .results-iframe-wrap iframe { width: 100%; height: 760px; border: none; display: block; }

    /* ── MOBILE TABS ── */
    .mobile-tabs { display: none; }

    @media (max-width: 700px) {

      .mobile-tabs {

      .mobile-tab {
        flex: 1; min-width: 0;

        font-size: 0.8rem; font-weight: 700; text-align: center;
        border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.5); transition: all 0.15s; white-space: nowrap;
      }
      .mobile-tab.active {
        background: rgba(56,182,255,0.15); border-color: rgba(56,182,255,0.4);
        color: #38b6ff;
      }
      .mobile-panel { display: none; }
      .mobile-panel.active { display: block; }
      .mobile-panel .results-iframe-wrap { display: block; }
      .mobile-panel .results-iframe-wrap iframe { height: 760px; }
    }

    .loc-ext-links { display: flex; gap: 10px; margin-top: 14px; }
    .loc-ext-link { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.55); transition: color 0.2s, background 0.2s, border-color 0.2s; text-decoration: none; }
    .loc-ext-link:hover { color: #38b6ff; background: rgba(56,182,255,0.1); border-color: rgba(56,182,255,0.35); }
    .next-quiz-badge {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 14px; padding: 8px 14px;
      background: rgba(56,182,255,0.08); border: 1px solid rgba(56,182,255,0.25);
      border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      color: rgba(255,255,255,0.7); transition: opacity 0.3s;
    }
    .next-quiz-badge .nq-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #38b6ff; flex-shrink: 0;
      animation: nqPulse 1.8s ease-in-out infinite;
    }
    .next-quiz-badge .nq-label { color: #38b6ff; font-weight: 700; }
    @keyframes nqPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  <script>
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => { navbar.classList.toggle('scrolled', window.scrollY > 30); });
    const navToggleBtn = document.getElementById('navToggle');
    const mobileNav = document.getElementById('mobileNav');
    const mobileClose = document.getElementById('mobileNavClose');
    navToggleBtn.addEventListener('click', () => { mobileNav.classList.add('open'); navToggleBtn.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; });
    function closeMobileNav() { mobileNav.classList.remove('open'); navToggleBtn.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
    mobileClose.addEventListener('click', closeMobileNav);
    document.querySelectorAll('.mobile-link').forEach(l => l.addEventListener('click', closeMobileNav));

    function showTab(index, btn) {
      document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.mobile-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.mobile-panel')[index].classList.add('active');
    }

  // Nächstes Quiz laden
  (function() {
    const today = new Date().toISOString().split('T')[0];
    fetch(`https://mqsxgzaliwzyghmgygea.supabase.co/rest/v1/quizes?location_id=eq.11&quiz_date=gte.${today}&order=quiz_date.asc&limit=1&select=quiz_date`, {
      headers: {
        'apikey': 'sb_publishable_n7-e_4YSOdzhdRPc6mKOgg_EF3jJqG6',
        'Authorization': 'Bearer sb_publishable_n7-e_4YSOdzhdRPc6mKOgg_EF3jJqG6'
      }
    }).then(r => r.json()).then(data => {
      if (data && data.length > 0) {
        const d = new Date(data[0].quiz_date);
        const opts = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
        document.getElementById('next-quiz-date').textContent = d.toLocaleDateString('de-DE', opts);
        document.getElementById('next-quiz-badge').style.display = 'inline-flex';
      }
    }).catch(() => {});
  })();
  </script>
<script>
window.addEventListener("message",function(e){
  if(e.data&&e.data.type==="kk-embed-resize"){
    document.querySelectorAll("iframe").forEach(function(f){
      if(f.contentWindow===e.source) f.style.height=e.data.height+"px";
    });
  }
});
